org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.overridePathCheck=true

# Some Flutter plugins still compile Kotlin with JVM target 1.8 while the app
# compiles Java/Kotlin with newer toolchains (e.g., Java 17). Kotlin Gradle
# plugin can fail the build with "Inconsistent JVM Target Compatibility".
# Ignore that validation and rely on bytecode compatibility (1.8 <= 17).
kotlin.jvm.target.validation.mode=ignore
